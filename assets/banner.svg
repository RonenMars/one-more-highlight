<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="one-more-highlight — Highlight the same word in three different ways. At the same time.">
  <defs>
    <filter id="rough" x="-2%" y="-8%" width="104%" height="116%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="2" seed="3"/>
      <feDisplacementMap in="SourceGraphic" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="rough-sm" x="-3%" y="-12%" width="106%" height="124%">
      <feTurbulence type="fractalNoise" baseFrequency="0.08" numOctaves="2" seed="5"/>
      <feDisplacementMap in="SourceGraphic" scale="1.4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <!-- Hairline -->
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#202632" stop-opacity="0"/>
      <stop offset="20%" stop-color="#202632" stop-opacity="1"/>
      <stop offset="80%" stop-color="#202632" stop-opacity="1"/>
      <stop offset="100%" stop-color="#202632" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background: ink-950 with subtle radial wash, brand-kit faithful -->
  <rect width="1280" height="640" fill="#0a0c10"/>
  <radialGradient id="wash-yellow" cx="50%" cy="0%" r="60%">
    <stop offset="0%" stop-color="#FFF166" stop-opacity="0.05"/>
    <stop offset="100%" stop-color="#FFF166" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="wash-pink" cx="85%" cy="20%" r="40%">
    <stop offset="0%" stop-color="#FFADD6" stop-opacity="0.04"/>
    <stop offset="100%" stop-color="#FFADD6" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="wash-green" cx="15%" cy="20%" r="40%">
    <stop offset="0%" stop-color="#A8FF80" stop-opacity="0.04"/>
    <stop offset="100%" stop-color="#A8FF80" stop-opacity="0"/>
  </radialGradient>
  <rect width="1280" height="640" fill="url(#wash-yellow)"/>
  <rect width="1280" height="640" fill="url(#wash-pink)"/>
  <rect width="1280" height="640" fill="url(#wash-green)"/>

  <!-- ===== Top-left: omh icon lockup ===== -->
  <g transform="translate(64 56)">
    <!-- icon container -->
    <rect width="56" height="56" rx="11" fill="#06070a"/>
    <!-- o (pink swipe), m (green swipe), h (yellow swipe), JetBrains Mono.
         Swipe rects sit BEHIND the letters with proper vertical alignment:
         text uses dominant-baseline=central so y=center of swipe.  -->
    <g font-family="'JetBrains Mono','Kode Mono',ui-monospace,monospace" font-weight="700" font-size="14" letter-spacing="-0.5">
      <!-- top row: o (left) m (right) -->
      <g transform="translate(18 17)">
        <rect x="-9" y="-8" width="18" height="14" rx="3" fill="#FFADD6" filter="url(#rough-sm)" transform="rotate(-2)"/>
        <text x="0" y="-1" fill="#06070a" text-anchor="middle" dominant-baseline="central">o</text>
      </g>
      <g transform="translate(38 17)">
        <rect x="-9" y="-8" width="18" height="14" rx="3" fill="#A8FF80" filter="url(#rough-sm)" transform="rotate(1)"/>
        <text x="0" y="-1" fill="#06070a" text-anchor="middle" dominant-baseline="central">m</text>
      </g>
      <!-- bottom row: h centered -->
      <g transform="translate(28 35)">
        <rect x="-9" y="-8" width="18" height="14" rx="3" fill="#FFF166" filter="url(#rough-sm)" transform="rotate(-1.5)"/>
        <text x="0" y="-1" fill="#06070a" text-anchor="middle" dominant-baseline="central">h</text>
      </g>
    </g>

    <!-- wordmark next to icon -->
    <text x="76" y="36" font-family="'JetBrains Mono','Kode Mono',ui-monospace,monospace" font-weight="700" font-size="22" fill="#e4e8ee" letter-spacing="-0.5">omh</text>
  </g>

  <!-- ===== Top-right: eyebrow ===== -->
  <text x="1216" y="92" text-anchor="end" font-family="'JetBrains Mono',ui-monospace,monospace" font-weight="400" font-size="13" fill="#8a93a3" letter-spacing="2">REACT · TYPESCRIPT · MIT · v1.1.0</text>

  <!-- ===== Headline ===== -->
  <!-- Line 1: Highlight the same word in -->
  <g font-family="'JetBrains Mono','Kode Mono',ui-monospace,monospace" font-weight="700" letter-spacing="-1.5">
    <text x="640" y="270" text-anchor="middle" font-size="56" fill="#e4e8ee">Highlight the same word in</text>
  </g>

  <!-- Line 2: [three] [different] [ways]. -->
  <!-- Layout: anchor at center (640) and flow the words left-to-right with measured widths.
       JetBrains Mono 56px bold: each character ≈ 33.5px wide.
       Widths: "three"=5×33.5=167, " "=33.5, "different"=9×33.5=302, " "=33.5, "ways"=4×33.5=134, "."=33.5.
       Total = 167+34+302+34+134+34 = 705. Start x = 640 - 705/2 = 287.5
  -->
  <g font-family="'JetBrains Mono','Kode Mono',ui-monospace,monospace" font-weight="700" font-size="56" letter-spacing="-1.5">

    <!-- "three" — yellow, rotated -1deg. Start at x=288, width 167 -->
    <g transform="translate(371 360) rotate(-1)">
      <rect x="-83" y="-46" width="166" height="60" rx="6" fill="#FFF166" filter="url(#rough)"/>
      <text x="0" y="0" text-anchor="middle" fill="#06070a">three</text>
    </g>

    <!-- "different" — pink, rotated -1deg. Start at x=288+167+34=489, width 302, center at 489+151=640 -->
    <g transform="translate(640 360) rotate(-1)">
      <rect x="-152" y="-46" width="304" height="60" rx="6" fill="#FFADD6" filter="url(#rough)"/>
      <text x="0" y="0" text-anchor="middle" fill="#06070a">different</text>
    </g>

    <!-- "ways" — green, rotated +1deg. Start at x=288+167+34+302+34=825, width 134, center at 825+67=892 -->
    <g transform="translate(892 360) rotate(1)">
      <rect x="-68" y="-46" width="136" height="60" rx="6" fill="#A8FF80" filter="url(#rough)"/>
      <text x="0" y="0" text-anchor="middle" fill="#06070a">ways</text>
    </g>

    <!-- period after ways -->
    <text x="975" y="360" fill="#e4e8ee">.</text>
  </g>

  <!-- Line 3: At the same time. -->
  <g font-family="'JetBrains Mono','Kode Mono',ui-monospace,monospace" font-weight="700" letter-spacing="-1.5">
    <text x="640" y="450" text-anchor="middle" font-size="56" fill="#e4e8ee">At the same time.</text>
  </g>

  <!-- ===== Bottom strip ===== -->
  <line x1="0" y1="540" x2="1280" y2="540" stroke="url(#rule)" stroke-width="1"/>

  <!-- Bottom: wordmark left, spec strip right -->
  <text x="64" y="588" font-family="'JetBrains Mono','Kode Mono',ui-monospace,monospace" font-weight="600" font-size="16" fill="#e4e8ee" letter-spacing="-0.3">one-more-highlight</text>
  <text x="64" y="610" font-family="'Geist','Inter',sans-serif" font-weight="400" font-size="13" fill="#8a93a3">Multi-state substring highlighting for React.</text>

  <!-- Spec strip right -->
  <g font-family="'JetBrains Mono',ui-monospace,monospace" font-weight="400" font-size="12" letter-spacing="0.5">
    <text x="1216" y="588" text-anchor="end" fill="#e4e8ee">~2 KB brotlied · React ≥ 18 · ESM + CJS</text>
    <text x="1216" y="610" text-anchor="end" fill="#8a93a3">Chrome 112+ · Firefox 140+ · Safari 16.4+ · Node 18+</text>
  </g>
</svg>
